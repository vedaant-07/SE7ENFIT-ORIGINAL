workflows:
  android-arm64-apk-preview:
    name: Android ARM64 APK Preview
    max_build_duration: 60

    environment:
      node: 20
      java: 17
      vars:
        EXPO_PUBLIC_API_BASE_URL: "https://se7en-fit.onrender.com"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Typecheck
        script: |
          npm run typecheck

      - name: Build ARM64 release APK
        script: |
          npm run build:codemagic:android-arm64

    artifacts:
      - android/app/build/outputs/**/*.apk

  android-playstore-aab-production:
    name: Android Play Store AAB Production
    max_build_duration: 60

    environment:
      node: 20
      java: 17
      vars:
        EXPO_PUBLIC_API_BASE_URL: "https://se7en-fit.onrender.com"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Typecheck
        script: |
          npm run typecheck

      - name: Build release AAB
        script: |
          npm run build:codemagic:android-aab

    artifacts:
      - android/app/build/outputs/**/*.aab
