workflows:
  android-test-apk:
    name: SE7EN FIT Android Test APK
    max_build_duration: 60
    environment:
      node: 22.16.0
      java: 17
      vars:
        EXPO_NO_TELEMETRY: "1"
        EXPO_PUBLIC_API_BASE_URL: "https://se7en-fit.onrender.com"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Generate Android project
        script: |
          CI=1 npx expo prebuild --platform android --no-install --clean
      - name: Force ARM64 Android ABI
        script: |
          if [ -f android/gradle.properties ]; then
            sed -i.bak "s/^reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/" android/gradle.properties || true
            grep -q '^reactNativeArchitectures=' android/gradle.properties || echo 'reactNativeArchitectures=arm64-v8a' >> android/gradle.properties
          fi
      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon -PreactNativeArchitectures=arm64-v8a
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/mapping.txt

  android-arm64-apk-preview:
    name: Android ARM64 APK Preview
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      vars:
        EXPO_PUBLIC_API_BASE_URL: "https://se7en-fit.onrender.com"
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Generate Android project from Expo
        script: |
          npx expo prebuild --platform android --clean --non-interactive
      - name: Configure small ARM64 release APK
        script: |
          node scripts/configure-android-arm64-release.js
      - name: Build ARM64 release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/mapping/release/mapping.txt

  android-playstore-aab-production:
    name: Android Play Store AAB Production
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      vars:
        EXPO_PUBLIC_API_BASE_URL: "https://se7en-fit.onrender.com"
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Generate Android project from Expo
        script: |
          npx expo prebuild --platform android --clean --non-interactive
      - name: Configure Android release optimizations
        script: |
          node scripts/configure-android-arm64-release.js --aab
      - name: Build production AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew :app:bundleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt
